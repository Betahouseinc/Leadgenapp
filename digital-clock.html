<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #282c34;\n            color: white;\n            font-family: 'Arial', sans-serif;\n        }\n        .clock {\n            font-size: 48px;\n            text-align: center;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock">\n        <div id="time">Loading...</div>\n    </div>\n    <script>\n        function updateClock() {\n            const zones = ['UTC', 'America/New_York', 'Europe/London', 'Asia/Tokyo'];\n            let timeHtml = '';\n            zones.forEach(zone => {\n                const options = {\n                    timeZone: zone,\n                    hour: '2-digit',\n                    minute: '2-digit',\n                    second: '2-digit',\n                    hour12: false\n                };\n                const time = new Date().toLocaleString('en-US', options);\n                timeHtml += `<div>${zone}: ${time}</div>`;\n            });\n            document.getElementById('time').innerHTML = timeHtml;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    </script>\n</body>\n</html>
